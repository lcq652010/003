# 边界测试文件 - 用于测试 PropertiesParser 的边界处理能力
# =============================================

# ===== 1. 正常配置项 =====
normal.key=This is a normal configuration value
app.name=TestApplication
app.version=1.0.0

# ===== 2. 超长键测试 =====
long.key.test.very.very.very.very.very.very.very.very.very.very.very.very.very.very.very.very.very.very.very.very.long=This key is very long but within reasonable limits

# ===== 3. 超长值测试 =====
long.value=This is a very long value that contains a lot of text to test how the parser handles long values without truncating or causing issues. It includes various characters like numbers 12345, symbols @#$%, and repeated text to make it significantly longer than usual values. This test helps ensure that the parser can handle large values efficiently without consuming excessive memory or causing performance problems. The value continues with more content: Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.

